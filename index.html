
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Text Intelligence — VMG Development</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent: #00ffa3; --accent2: #ff6b6b; --accent3: #6b8cff;
      --text: #e8e8f0; --muted: #6b6b80;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    .app { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
    .header { text-align: center; margin-bottom: 48px; position: relative; }
    .header::before { content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,255,163,0.08) 0%, transparent 70%); pointer-events: none; }
    .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(0,255,163,0.3); padding: 4px 14px; border-radius: 20px; margin-bottom: 20px; }
    h1 { font-size: clamp(32px, 6vw, 56px); font-weight: 800; line-height: 1.05; letter-spacing: -2px; background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: var(--muted); margin-top: 12px; font-size: 16px; }
    .api-banner { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 28px; }
    .api-banner.saved { border-color: rgba(0,255,163,0.3); }
    .api-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .api-row { display: flex; gap: 10px; align-items: center; }
    .api-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
    .api-input:focus { border-color: rgba(0,255,163,0.4); }
    .api-save { padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(0,255,163,0.3); background: rgba(0,255,163,0.1); color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .api-hint { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
    .api-hint a { color: var(--accent3); text-decoration: none; }
    .api-saved-msg { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
    .change-key-btn { margin-left: auto; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; cursor: pointer; }
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; transition: all 0.2s; background: transparent; color: var(--muted); }
    .tab.active { background: var(--border); color: var(--text); }
    .tab.detect.active { color: var(--accent); }
    .tab.humanize.active { color: var(--accent3); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,255,163,0.3), transparent); }
    .card.humanize-card::before { background: linear-gradient(90deg, transparent, rgba(107,140,255,0.3), transparent); }
    textarea { width: 100%; min-height: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; line-height: 1.7; padding: 16px; resize: vertical; outline: none; transition: border-color 0.2s; }
    textarea:focus { border-color: rgba(0,255,163,0.4); }
    textarea.hf:focus { border-color: rgba(107,140,255,0.4); }
    .word-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 8px; text-align: right; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 20px; padding: 16px; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    .btn-detect { background: rgba(0,255,163,0.12); color: var(--accent); border: 1px solid rgba(0,255,163,0.25); }
    .btn-humanize { background: rgba(107,140,255,0.12); color: var(--accent3); border: 1px solid rgba(107,140,255,0.25); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .spinner { width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-section { margin-top: 28px; }
    .result-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .detect-result { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .score-label { font-size: 14px; color: var(--muted); font-weight: 700; }
    .score-value { font-size: 42px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
    .score-bar { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
    .score-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .verdict { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 10px; font-weight: 700; font-size: 14px; }
    .verdict.ai { background: rgba(255,107,107,0.1); color: var(--accent2); border: 1px solid rgba(255,107,107,0.2); }
    .verdict.human { background: rgba(0,255,163,0.08); color: var(--accent); border: 1px solid rgba(0,255,163,0.2); }
    .verdict.mixed { background: rgba(255,200,0,0.08); color: #ffc800; border: 1px solid rgba(255,200,0,0.2); }
    .signals { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .signal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 12px; line-height: 1.5; color: var(--muted); }
    .signal strong { display: block; color: var(--text); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
    .humanize-output { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px 60px 20px 20px; font-family: 'DM Mono', monospace; font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; position: relative; }
    .copy-btn { position: absolute; top: 12px; right: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 10px; cursor: pointer; }
    .changes-list { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .change-tag { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; border-radius: 20px; background: rgba(107,140,255,0.1); color: var(--accent3); border: 1px solid rgba(107,140,255,0.2); }
    .error-msg { color: var(--accent2); font-family: 'DM Mono', monospace; font-size: 13px; padding: 16px; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); border-radius: 10px; margin-top: 16px; }
    .tone-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 16px; margin-bottom: 8px; }
    .tone-select { display: flex; gap: 8px; flex-wrap: wrap; }
    .tone-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
    .tone-btn.active { background: rgba(107,140,255,0.15); color: var(--accent3); border-color: rgba(107,140,255,0.3); }
    .reasoning { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.6; }
    .credits { margin-top: 56px; text-align: center; }
    .credits::before { content: ''; display: block; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin-bottom: 32px; }
    .credits-inner { display: inline-flex; flex-direction: column; align-items: center; gap: 10px; }
    .credits-made { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    .credits-brand { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff 0%, var(--muted) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .credits-brand::after { content: ''; display: block; height: 2px; margin-top: 4px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent3)); opacity: 0.7; }
    .credits-dot { width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent3)); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    async function callClaude(apiKey, messages, system) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,
          system,
          messages
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.content?.[0]?.text || "";
    }

    function App() {
      const [tab, setTab] = useState("detect");
      const [text, setText] = useState("");
      const [loading, setLoading] = useState(false);
      const [detectResult, setDetectResult] = useState(null);
      const [humanResult, setHumanResult] = useState(null);
      const [error, setError] = useState("");
      const [tone, setTone] = useState("casual");
      const [copied, setCopied] = useState(false);
      const [apiKey, setApiKey] = useState("");
      const [savedKey, setSavedKey] = useState("");

      const words = text.trim().split(/\s+/).filter(Boolean).length;

      const saveKey = () => {
        if (apiKey.trim().startsWith("sk-ant-")) {
          setSavedKey(apiKey.trim());
        } else {
          alert("Please enter a valid Anthropic API key (starts with sk-ant-)");
        }
      };

      const detect = async () => {
        if (!text.trim() || words < 20 || !savedKey) return;
        setLoading(true); setError(""); setDetectResult(null);
        try {
          const system = `You are an AI text detection expert. Analyze the text and return ONLY valid JSON with no extra text:
{"score":<integer 0-100>,"verdict":"AI","signals":[{"label":"Label","description":"desc"},{"label":"Label","description":"desc"},{"label":"Label","description":"desc"},{"label":"Label","description":"desc"}],"reasoning":"one sentence"}
verdict must be exactly "AI", "Human", or "Mixed".`;
          const raw = await callClaude(savedKey, [{ role: "user", content: text }], system);
          const clean = raw.replace(/```json|```/g, "").trim();
          setDetectResult(JSON.parse(clean));
        } catch (e) {
          setError("Analysis failed: " + e.message);
        }
        setLoading(false);
      };

      const humanize = async () => {
        if (!text.trim() || words < 10 || !savedKey) return;
        setLoading(true); setError(""); setHumanResult(null);
        try {
          const system = `Rewrite the AI-generated text to sound human in a ${tone} tone. Return ONLY valid JSON with no extra text:
{"rewritten":"rewritten text here","changes":["change 1","change 2","change 3","change 4"]}`;
          const raw = await callClaude(savedKey, [{ role: "user", content: `Rewrite this:\n\n${text}` }], system);
          const clean = raw.replace(/```json|```/g, "").trim();
          setHumanResult(JSON.parse(clean));
        } catch (e) {
          setError("Rewriting failed: " + e.message);
        }
        setLoading(false);
      };

      const copyText = () => {
        navigator.clipboard.writeText(humanResult.rewritten);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const scoreColor = (s) => s >= 70 ? "#ff6b6b" : s >= 40 ? "#ffc800" : "#00ffa3";
      const tones = ["casual", "professional", "friendly", "academic"];

      return (
        <div className="app">
          <div className="header">
            <div className="badge">✦ Powered by Claude AI</div>
            <h1>AI Text<br />Intelligence</h1>
            <p className="subtitle">Detect AI-generated content · Rewrite it to sound human</p>
          </div>

          <div className={`api-banner${savedKey ? " saved" : ""}`}>
            <div className="api-label">🔑 Anthropic API Key</div>
            {savedKey ? (
              <div className="api-saved-msg">
                ✅ Key saved — you're ready to go!
                <button className="change-key-btn" onClick={() => { setSavedKey(""); setApiKey(""); }}>Change</button>
              </div>
            ) : (
              <>
                <div className="api-row">
                  <input className="api-input" type="password" placeholder="sk-ant-api03-..." value={apiKey} onChange={e => setApiKey(e.target.value)} onKeyDown={e => e.key === "Enter" && saveKey()} />
                  <button className="api-save" onClick={saveKey}>Save Key</button>
                </div>
                <div className="api-hint">Get a free API key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> — your key never leaves your browser</div>
              </>
            )}
          </div>

          <div className="tabs">
            <button className={`tab detect${tab === "detect" ? " active" : ""}`} onClick={() => { setTab("detect"); setError(""); }}>🔍 AI Detector</button>
            <button className={`tab humanize${tab === "humanize" ? " active" : ""}`} onClick={() => { setTab("humanize"); setError(""); }}>✍️ AI → Human</button>
          </div>

          <div className={`card${tab === "humanize" ? " humanize-card" : ""}`}>
            <textarea
              className={tab === "humanize" ? "hf" : ""}
              placeholder={tab === "detect" ? "Paste any text here to check if it was AI-written... (min 20 words)" : "Paste AI-generated text here to rewrite it as human... (min 10 words)"}
              value={text}
              onChange={e => { setText(e.target.value); setDetectResult(null); setHumanResult(null); setError(""); }}
            />
            <div className="word-count">{words} words</div>

            {tab === "humanize" && (
              <>
                <div className="tone-label">Output Tone</div>
                <div className="tone-select">
                  {tones.map(t => <button key={t} className={`tone-btn${tone === t ? " active" : ""}`} onClick={() => setTone(t)}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>)}
                </div>
              </>
            )}

            <button
              className={`btn btn-${tab === "detect" ? "detect" : "humanize"}`}
              disabled={loading || !savedKey || (tab === "detect" ? words < 20 : words < 10)}
              onClick={tab === "detect" ? detect : humanize}
            >
              {!savedKey ? "⚠ Enter API Key Above First" :
                loading ? <><span className="spinner" /> {tab === "detect" ? "Analyzing..." : "Rewriting..."}</> :
                tab === "detect" ? "→ Analyze Text" : "→ Humanize Text"}
            </button>

            {error && <div className="error-msg">⚠ {error}</div>}

            {tab === "detect" && detectResult && (
              <div className="result-section">
                <div className="result-label">Analysis Result</div>
                <div className="detect-result">
                  <div className="score-row">
                    <div>
                      <div className="score-label">AI Probability</div>
                      <div className="score-value" style={{color: scoreColor(detectResult.score)}}>{detectResult.score}%</div>
                    </div>
                    <div className={`verdict ${detectResult.verdict.toLowerCase()}`}>
                      {detectResult.verdict === "AI" ? "🤖" : detectResult.verdict === "Human" ? "👤" : "⚡"} {detectResult.verdict} Written
                    </div>
                  </div>
                  <div className="score-bar">
                    <div className="score-fill" style={{width: `${detectResult.score}%`, background: scoreColor(detectResult.score)}} />
                  </div>
                  <p className="reasoning">{detectResult.reasoning}</p>
                  {detectResult.signals?.length > 0 && (
                    <div className="signals">
                      {detectResult.signals.map((s, i) => <div key={i} className="signal"><strong>{s.label}</strong>{s.description}</div>)}
                    </div>
                  )}
                </div>
              </div>
            )}

            {tab === "humanize" && humanResult && (
              <div className="result-section">
                <div className="result-label">Humanized Output</div>
                <div className="humanize-output">
                  {humanResult.rewritten}
                  <button className="copy-btn" onClick={copyText}>{copied ? "✓ Copied" : "Copy"}</button>
                </div>
                {humanResult.changes?.length > 0 && (
                  <>
                    <div className="result-label" style={{marginTop: 16}}>Changes Made</div>
                    <div className="changes-list">
                      {humanResult.changes.map((c, i) => <span key={i} className="change-tag">{c}</span>)}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>

          <div className="credits">
            <div className="credits-inner">
              <span className="credits-made">Made by</span>
              <span className="credits-brand">VMG Development</span>
              <div className="credits-dot" />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
